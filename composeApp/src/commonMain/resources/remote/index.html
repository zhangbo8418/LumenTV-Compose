<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <title>影視</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/ui.css">
    <script src="js/jquery.min.js" defer></script>
    <script src="js/script.js" defer></script>
</head>

<body>
    <div id="app">
        <!-- Content -->
        <div class="app-body">
            <!-- 搜尋 -->
            <div id="panel1" class="tab-panel active">
                <div class="panel-content">
                    <div class="md-field">
                        <input id="keyword" class="md-input" type="text" placeholder="請輸入關鍵字..." />
                    </div>
                    <button class="md-btn md-btn-filled md-btn-full" onclick="search()">確定</button>
                </div>
            </div>
            <!-- 推送 -->
            <div id="panel2" class="tab-panel">
                <div class="panel-content">
                    <div class="md-field">
                        <input id="push_url" class="md-input" type="text" placeholder="請輸入播放網址..." />
                    </div>
                    <button class="md-btn md-btn-filled md-btn-full" onclick="push()">確定</button>
                </div>
            </div>
            <!-- 彈幕 -->
            <div id="panel3" class="tab-panel">
                <div class="panel-content">
                    <div class="field-row">
                        <div class="md-field">
                            <button class="md-btn md-btn-tonal md-btn-full" onclick="showDanmakuModeDialog()">
                                <span id="danmaku_mode_label">滾動</span>
                                <svg style="margin-left:auto;flex-shrink:0" width="18" height="18" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
                            </button>
                        </div>
                        <div class="md-field">
                            <button class="md-btn md-btn-tonal md-btn-full" onclick="showDanmakuSizeDialog()">
                                <span id="danmaku_size_label">預設</span>
                                <svg style="margin-left:auto;flex-shrink:0" width="18" height="18" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="md-field">
                        <input id="danmaku_text" class="md-input" type="text" placeholder="請輸入彈幕內容..." />
                    </div>
                    <button class="md-btn md-btn-filled md-btn-full" onclick="sendDanmaku()">發送</button>
                </div>
            </div>
            <!-- 設定 -->
            <div id="panel4" class="tab-panel">
                <div class="panel-content">
                    <div class="field-row">
                        <div class="md-field short">
                            <input id="setting_name" class="md-input" type="text" placeholder="名稱" />
                        </div>
                        <div class="md-field">
                            <input id="setting_text" class="md-input" type="text" placeholder="配置" />
                        </div>
                    </div>
                    <button onclick="setting()" class="md-btn md-btn-filled md-btn-full">確定</button>
                </div>
            </div>
            <!-- 本地 -->
            <div id="panel5" class="tab-panel">
                <input type="file" id="file_uploader" onchange="onFileSelected()" multiple />
                <div class="md-toolbar">
                    <button class="md-btn md-btn-tonal" onclick="uploadFile()">上傳檔案</button>
                    <button class="md-btn md-btn-tonal" onclick="showNewFolderDialog()">新增資料夾</button>
                </div>
                <div id="file_list"></div>
            </div>
            <!-- 播放控制 -->
            <div id="panel6" class="tab-panel">
                <div class="panel-content">
                    <div class="md-field">
                        <div id="media_title" class="md-input" style="min-height:24px;border:none;background:transparent;padding:4px 0">未播放</div>
                    </div>
                    <div class="md-field">
                        <div id="media_progress" class="md-input" style="min-height:24px;border:none;background:transparent;padding:4px 0">00:00:00 / 00:00:00</div>
                    </div>
                    <div class="md-field">
                        <div id="media_state" class="md-input" style="min-height:24px;border:none;background:transparent;padding:4px 0">—</div>
                    </div>
                    <div class="field-row" style="margin-top:12px">
                        <button class="md-btn md-btn-tonal md-btn-full" onclick="control('play')">播放</button>
                        <button class="md-btn md-btn-tonal md-btn-full" onclick="control('pause')">暫停</button>
                    </div>
                    <div class="field-row">
                        <button class="md-btn md-btn-tonal md-btn-full" onclick="control('prev')">上一集</button>
                        <button class="md-btn md-btn-tonal md-btn-full" onclick="control('next')">下一集</button>
                    </div>
                    <button class="md-btn md-btn-filled md-btn-full" style="margin-top:8px" onclick="control('stop')">停止</button>
                </div>
            </div>
        </div>
        <!-- M3 Navigation Bar -->
        <nav class="md-nav-bar">
            <div id="tab1" class="md-nav-item active" onclick="showPanel(1)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
                <span class="md-nav-label">搜尋</span>
            </div>
            <div id="tab2" class="md-nav-item" onclick="showPanel(2)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3zM8 13h2.55v3h2.9v-3H16l-4-4z"/></svg>
                </div>
                <span class="md-nav-label">推送</span>
            </div>
            <div id="tab3" class="md-nav-item" onclick="showPanel(3)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                </div>
                <span class="md-nav-label">彈幕</span>
            </div>
            <div id="tab4" class="md-nav-item" onclick="showPanel(4)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M19.43 12.98c.04-.32.07-.64.07-.98 0-.34-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.09-.16-.26-.25-.44-.25-.06 0-.12.01-.17.03l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.06-.02-.12-.03-.18-.03-.17 0-.34.09-.43.25l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.09.16.26.25.44.25.06 0 .12-.01.17-.03l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.06.02.12.03.18.03.17 0 .34-.09.43-.25l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zm-1.98-1.71c.04.31.05.52.05.73 0 .21-.02.43-.05.73l-.14 1.13.89.7 1.08.84-.7 1.21-1.27-.51-1.04-.42-.9.68c-.43.32-.84.56-1.25.73l-1.06.43-.16 1.13-.2 1.35h-1.4l-.19-1.35-.16-1.13-1.06-.43c-.43-.18-.83-.41-1.23-.71l-.91-.7-1.06.43-1.27.51-.7-1.21 1.08-.84.89-.7-.14-1.13c-.03-.31-.05-.54-.05-.74s.02-.43.05-.73l.14-1.13-.89-.7-1.08-.84.7-1.21 1.27.51 1.04.42.9-.68c.43-.32.84-.56 1.25-.73l1.06-.43.16-1.13.2-1.35h1.39l.19 1.35.16 1.13 1.06.43c.43.18.83.41 1.23.71l.91.7 1.06-.43 1.27-.51.7 1.21-1.07.85-.89.7.14 1.13zM12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                </div>
                <span class="md-nav-label">設定</span>
            </div>
            <div id="tab5" class="md-nav-item" onclick="showPanel(5)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M9.17 6l2 2H20v10H4V6h5.17M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                </div>
                <span class="md-nav-label">本地</span>
            </div>
            <div id="tab6" class="md-nav-item" onclick="showPanel(6)">
                <div class="md-nav-indicator">
                    <svg class="md-nav-icon" viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M8 5v14l11-7z"/></svg>
                </div>
                <span class="md-nav-label">播放</span>
            </div>
        </nav>
    </div>
    <!-- Dialog: 彈幕模式 -->
    <div id="danmakuModeDialog" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">模式</div>
            <div class="md-dialog-list">
                <div class="md-dialog-list-item active" data-val="1" onclick="setDanmakuMode(1,'滾動')"><span>滾動</span></div>
                <div class="md-dialog-list-item" data-val="5" onclick="setDanmakuMode(5,'頂部')"><span>頂部</span></div>
                <div class="md-dialog-list-item" data-val="4" onclick="setDanmakuMode(4,'底部')"><span>底部</span></div>
                <div class="md-dialog-list-item" data-val="6" onclick="setDanmakuMode(6,'反向')"><span>反向</span></div>
            </div>
        </div>
    </div>
    <!-- Dialog: 彈幕大小 -->
    <div id="danmakuSizeDialog" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">大小</div>
            <div class="md-dialog-list">
                <div class="md-dialog-list-item" data-val="18" onclick="setDanmakuSize(18,'小')"><span>小</span></div>
                <div class="md-dialog-list-item active" data-val="25" onclick="setDanmakuSize(25,'預設')"><span>預設</span></div>
                <div class="md-dialog-list-item" data-val="36" onclick="setDanmakuSize(36,'大')"><span>大</span></div>
            </div>
        </div>
    </div>
    <!-- Dialog: 本地路徑 -->
    <div id="fileInfoDialog" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">本地路徑</div>
            <div class="md-dialog-body" id="fileUrl"></div>
            <div class="md-dialog-actions">
                <button onclick="pushFile(0)" class="md-dialog-btn">關閉</button>
                <button onclick="pushFile(1)" class="md-dialog-btn">使用</button>
            </div>
        </div>
    </div>
    <!-- Dialog: 確認上傳 -->
    <div id="uploadTip" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">確認上傳？</div>
            <div class="md-dialog-body" id="uploadTipContent"></div>
            <div class="md-dialog-actions">
                <button onclick="confirmUpload(0)" class="md-dialog-btn">取消</button>
                <button onclick="confirmUpload(1)" class="md-dialog-btn">確定</button>
            </div>
        </div>
    </div>
    <!-- Dialog: 新增資料夾 -->
    <div id="newFolder" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">新增資料夾</div>
            <div class="md-dialog-body">
                <input id="newFolderContent" class="md-input" type="text" placeholder="請輸入資料夾名稱..." />
            </div>
            <div class="md-dialog-actions">
                <button onclick="confirmNewFolder(0)" class="md-dialog-btn">取消</button>
                <button onclick="confirmNewFolder(1)" class="md-dialog-btn">確定</button>
            </div>
        </div>
    </div>
    <!-- Dialog: 刪除資料夾 -->
    <div id="delFolder" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">刪除資料夾</div>
            <div class="md-dialog-body" id="delFolderContent"></div>
            <div class="md-dialog-actions">
                <button onclick="confirmDelFolder(0)" class="md-dialog-btn">取消</button>
                <button onclick="confirmDelFolder(1)" class="md-dialog-btn error">刪除</button>
            </div>
        </div>
    </div>
    <!-- Dialog: 刪除檔案 -->
    <div id="delFile" class="md-dialog-overlay">
        <div class="md-dialog">
            <div class="md-dialog-title">刪除檔案</div>
            <div class="md-dialog-body" id="delFileContent"></div>
            <div class="md-dialog-actions">
                <button onclick="confirmDelFile(0)" class="md-dialog-btn">取消</button>
                <button onclick="confirmDelFile(1)" class="md-dialog-btn error">刪除</button>
            </div>
        </div>
    </div>
    <!-- Snackbar: 警告 -->
    <div id="warnToast">
        <div class="md-snackbar" id="warnToastContent"></div>
    </div>
    <!-- Loading -->
    <div id="loadingToast">
        <div class="md-progress-wrap">
            <svg class="md-progress" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="20"/>
            </svg>
        </div>
    </div>
</body>
</html>
