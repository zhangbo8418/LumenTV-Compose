name: Build QuickJS natives

on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Open a PR that commits built natives into appResources/*/lib/"
        type: boolean
        default: true
      quickjs_tag:
        description: "HarlonWang/quickjs-wrapper git tag"
        type: string
        default: "3.2.3"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            artifact: quickjs-windows-x64
            java_arch: x64
          - platform: linux-x64
            os: ubuntu-latest
            artifact: quickjs-linux-x64
            java_arch: x64
          - platform: macos-arm64
            os: macos-14
            artifact: quickjs-macos-arm64
            java_arch: aarch64
          - platform: macos-x64
            os: macos-14
            artifact: quickjs-macos-x64
            java_arch: x64
            rosetta: true

    runs-on: ${{ matrix.os }}
    env:
      QUICKJS_TAG: ${{ inputs.quickjs_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          architecture: ${{ matrix.java_arch }}

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git

      - name: Install MinGW msvcrt toolchain (Windows Win7 build)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          # 固定 niXman MSVCRT 工具链：choco mingw 版本不受控且可能是 UCRT 目标，
          # UCRT 依赖 ucrtbase.dll，Win7 未装 KB2999226 时加载必失败
          $url = "https://github.com/niXman/mingw-builds-binaries/releases/download/15.2.0-rt_v13-rev1/x86_64-15.2.0-release-posix-seh-msvcrt-rt_v13-rev1.7z"
          curl.exe -sSL -o "$env:RUNNER_TEMP\mingw.7z" $url
          7z x "$env:RUNNER_TEMP\mingw.7z" -o"C:\mingw-msvcrt" | Out-Null
          echo "C:\mingw-msvcrt\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\mingw-msvcrt\mingw64\bin\gcc.exe" --version
          cmake --version

      - name: Build QuickJS native (Windows Win7)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: ./scripts/build-quickjs-native.ps1 -Platform windows-x64

      - name: Build QuickJS native (Linux)
        if: matrix.platform == 'linux-x64'
        run: |
          chmod +x ./scripts/build-quickjs-native.sh
          ./scripts/build-quickjs-native.sh linux-x64

      - name: Build QuickJS native (macOS arm64)
        if: matrix.platform == 'macos-arm64'
        run: |
          chmod +x ./scripts/build-quickjs-native.sh
          ./scripts/build-quickjs-native.sh macos-arm64

      - name: Build QuickJS native (macOS x64)
        if: matrix.platform == 'macos-x64'
        run: |
          chmod +x ./scripts/build-quickjs-native.sh
          arch -x86_64 ./scripts/build-quickjs-native.sh macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            composeApp/src/desktopMain/appResources/${{ matrix.platform }}/lib/libquickjs-java-wrapper.*
            composeApp/src/desktopMain/appResources/${{ matrix.platform }}/lib/quickjs-java-wrapper.dll
          if-no-files-found: error

  commit-pr:
    if: ${{ inputs.create_pr }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all QuickJS artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/quickjs-natives

      - name: Place natives into appResources
        run: |
          set -euo pipefail
          ROOT="composeApp/src/desktopMain/appResources"
          mkdir -p "$ROOT/windows-x64/lib" "$ROOT/linux-x64/lib" "$ROOT/macos-arm64/lib" "$ROOT/macos-x64/lib"

          find /tmp/quickjs-natives -type f \( -name 'libquickjs-java-wrapper.*' -o -name 'quickjs-java-wrapper.dll' \) -print

          copy_one() {
            local platform="$1"
            local pattern="$2"
            local dest="$ROOT/$platform/lib"
            local found
            found="$(find /tmp/quickjs-natives -type f -name "$pattern" | head -n 1 || true)"
            if [[ -z "$found" ]]; then
              echo "Missing $pattern for $platform" >&2
              exit 1
            fi
            cp -f "$found" "$dest/"
            ls -la "$dest/$pattern"
          }

          copy_one windows-x64 "quickjs-java-wrapper.dll"
          copy_one linux-x64 "libquickjs-java-wrapper.so"
          copy_one macos-arm64 "libquickjs-java-wrapper.dylib"
          copy_one macos-x64 "libquickjs-java-wrapper.dylib"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update QuickJS natives ${{ inputs.quickjs_tag }}"
          title: "chore: update QuickJS natives ${{ inputs.quickjs_tag }}"
          body: |
            Automated update of `quickjs-java-wrapper` natives for:

            - windows-x64 (Win7 SP1 targeted MinGW build)
            - linux-x64
            - macos-arm64
            - macos-x64

            Source: HarlonWang/quickjs-wrapper@${{ inputs.quickjs_tag }}
          branch: chore/quickjs-natives-${{ inputs.quickjs_tag }}
          delete-branch: true
          add-paths: |
            composeApp/src/desktopMain/appResources/*/lib/libquickjs-java-wrapper.*
            composeApp/src/desktopMain/appResources/*/lib/quickjs-java-wrapper.dll
