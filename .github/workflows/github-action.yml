name: LumenTV Compose Build
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  set-tag:
    uses: ./.github/workflows/set-tag-workflow.yml

  build-updater:
    uses: ./.github/workflows/build-updater.yml
    with:
      release_tag: ${{ needs.set-tag.outputs.tag }}

  build-win:
    runs-on: windows-latest
    needs: [set-tag, build-updater]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'
      - name: 🐍 Set up Python (host pip for Win7 embed wheels)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: echo ${{needs.set-tag.outputs.tag}}
      - run: ls
      - name: 🐍 Prepare bundled Python (Win7 embed)
        shell: pwsh
        run: ./gradlew prepareBundledPython "-Plumen.python.platform=windows-x64"
      - name: 🎬 Prepare bundled ffmpeg (windows-x64)
        # PowerShell 会把 -Plumen.xxx 拆成任务名，必须给 -P 参数加引号
        shell: pwsh
        run: ./gradlew prepareBundledFfmpeg "-Plumen.ffmpeg.platform=windows-x64"
      - run: ./gradlew packageReleaseDistributionForCurrentOS
      - run: ./gradlew createReleaseDistributable
      - run: tree /f ./composeApp/build
      - run: ls && tree ./desktopApp /f
      - name: compress
        shell: pwsh
        run: Compress-Archive -Path "./composeApp/build/compose/binaries/main-release/app/LumenTV" -DestinationPath ./LumenTV-win-${{ needs.set-tag.outputs.tag }}.zip
      - name: move result to root
        shell: pwsh
        run: |
          # 移动 MSI 文件到根目录
          $msiPath = "./composeApp/build/compose/binaries/main-release/msi"
          if (Test-Path $msiPath) {
            Get-ChildItem -Path $msiPath -Filter "*.msi" | ForEach-Object {
              $newName = "LumenTV-win-${{ needs.set-tag.outputs.tag }}.msi"
              Move-Item $_.FullName "./$newName" -Force
              Write-Host "✅ MSI 文件已移动并重命名: $newName"
            }
          } else {
            Write-Host "⚠️  MSI 目录不存在: $msiPath"
          }
          
          # 创建并移动 ZIP 文件
          $appPath = "./composeApp/build/compose/binaries/main-release/app/LumenTV"
          if (Test-Path $appPath) {
            $zipName = "LumenTV-win-${{ needs.set-tag.outputs.tag }}.zip"
            Compress-Archive -Path "$appPath" -DestinationPath "./$zipName" -Force
            Write-Host "✅ Windows ZIP 包已创建: $zipName"
          } else {
            Write-Host "❌ 应用目录不存在: $appPath"
            exit 1
          }

      - name: 📤 Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-file
          path: |
            *.msi
            *.zip

  build-linux:
    runs-on: ubuntu-latest
    needs: [set-tag, build-updater]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'
      - run: ls
      - name: 🎬 Prepare bundled ffmpeg (linux-x64)
        run: chmod +x ./gradlew && ./gradlew prepareBundledFfmpeg "-Plumen.ffmpeg.platform=linux-x64"
      - run: ./gradlew createReleaseDistributable
      - run: ./gradlew packageReleaseDistributionForCurrentOS
      - run: ls && tree
      - name: compress
        run: cd ./composeApp/build/compose/binaries/main-release/app && zip -q -r ./LumenTV-linux-${{ needs.set-tag.outputs.tag }}.zip ./LumenTV
      - name: move file
        run: mv ./composeApp/build/compose/binaries/main-release/deb/*.deb ./LumenTV-linux-${{ needs.set-tag.outputs.tag }}.deb && mv ./composeApp/build/compose/binaries/main-release/app/*.zip ./
      - run: ls
      - uses: actions/upload-artifact@v4
        with:
          name: linux-file
          path: |
            *.deb
            *.zip

  build-mac-arm64:
    runs-on: macos-14
    needs: [set-tag, build-updater]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: 🐍 Prepare bundled Python (macos-arm64)
        run: |
          chmod +x ./gradlew
          ./gradlew prepareBundledPython "-Plumen.python.platform=macos-arm64"

      - name: 🎬 Prepare bundled ffmpeg (macos-arm64)
        run: ./gradlew prepareBundledFfmpeg "-Plumen.ffmpeg.platform=macos-arm64"

      - name: 🏗️ Package macOS arm64
        run: |
          ./gradlew createReleaseDistributable packageReleaseDistributionForCurrentOS

      - name: 📦 Compress artifacts
        run: |
          TAG="${{ needs.set-tag.outputs.tag }}"
          zip -q -r "./LumenTV-mac-arm64-${TAG}.zip" ./composeApp/build/compose/binaries/main-release/app
          # 兼容旧下载名
          cp "./LumenTV-mac-arm64-${TAG}.zip" "./LumenTV-mac-${TAG}.zip"
          mv ./composeApp/build/compose/binaries/main-release/dmg/*.dmg "./LumenTV-mac-arm64-${TAG}.dmg"
          cp "./LumenTV-mac-arm64-${TAG}.dmg" "./LumenTV-mac-${TAG}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-file
          path: |
            LumenTV-mac-arm64-*.dmg
            LumenTV-mac-arm64-*.zip
            LumenTV-mac-*.dmg
            LumenTV-mac-*.zip

  build-mac-amd64:
    runs-on: macos-14
    needs: [set-tag, build-updater]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java (x64 under Rosetta)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          architecture: x64
          cache: 'gradle'

      - name: 🐍 Prepare bundled Python (macos-x64)
        run: |
          chmod +x ./gradlew
          # 用 x64 Python 解释器装依赖（Rosetta）
          arch -x86_64 ./gradlew prepareBundledPython "-Plumen.python.platform=macos-x64"

      - name: 🎬 Prepare bundled ffmpeg (macos-x64)
        run: arch -x86_64 ./gradlew prepareBundledFfmpeg "-Plumen.ffmpeg.platform=macos-x64"

      - name: 🏗️ Package macOS amd64
        run: |
          arch -x86_64 ./gradlew createReleaseDistributable packageReleaseDistributionForCurrentOS

      - name: 📦 Compress artifacts
        run: |
          TAG="${{ needs.set-tag.outputs.tag }}"
          zip -q -r "./LumenTV-mac-amd64-${TAG}.zip" ./composeApp/build/compose/binaries/main-release/app
          if ls ./composeApp/build/compose/binaries/main-release/dmg/*.dmg >/dev/null 2>&1; then
            mv ./composeApp/build/compose/binaries/main-release/dmg/*.dmg "./LumenTV-mac-amd64-${TAG}.dmg"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mac-amd64-file
          path: |
            LumenTV-mac-amd64-*.dmg
            LumenTV-mac-amd64-*.zip

  release:
    runs-on: ubuntu-latest
    needs: [ build-win, build-linux, build-mac-arm64, build-mac-amd64, set-tag, build-updater ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4

      - name: 📋 Organize files for release
        run: |
          echo "📂 整理发布文件"
          mkdir -p ./release-files
          
          cp ./win-file/* ./release-files/ 2>/dev/null || true
          cp ./linux-file/* ./release-files/ 2>/dev/null || true
          cp ./mac-arm64-file/* ./release-files/ 2>/dev/null || true
          cp ./mac-amd64-file/* ./release-files/ 2>/dev/null || true
          
          find . -path "*/updater-linux-amd64/updater" -exec cp {} ./release-files/updater-linux-amd64 \;
          find . -path "*/updater-linux-arm64/updater" -exec cp {} ./release-files/updater-linux-arm64 \;
          find . -path "*/updater-windows-amd64/updater.exe" -exec cp {} ./release-files/updater-windows-amd64.exe \;
          find . -path "*/updater-macos-amd64/updater" -exec cp {} ./release-files/updater-macos-amd64 \;
          find . -path "*/updater-macos-arm64/updater" -exec cp {} ./release-files/updater-macos-arm64 \;

          echo "📋 发布文件列表:"
          ls -la ./release-files/

      - name: 📝 Generate version.json
        run: |
          VERSION="${{ needs.set-tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          python3 <<'PY'
          import json, os
          version = os.environ["VERSION"]
          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}/releases/download/{version}"
          data = {
            "version": version,
            "windows": {
              "download_url": f"{base}/LumenTV-win-{version}.zip",
              "msi_url": f"{base}/LumenTV-win-{version}.msi",
            },
            "linux": {
              "download_url": f"{base}/LumenTV-linux-{version}.zip",
              "deb_url": f"{base}/LumenTV-linux-{version}.deb",
            },
            "mac": {
              "download_url": f"{base}/LumenTV-mac-arm64-{version}.zip",
              "dmg_url": f"{base}/LumenTV-mac-arm64-{version}.dmg",
            },
            "mac_arm64": {
              "download_url": f"{base}/LumenTV-mac-arm64-{version}.zip",
              "dmg_url": f"{base}/LumenTV-mac-arm64-{version}.dmg",
            },
            "mac_amd64": {
              "download_url": f"{base}/LumenTV-mac-amd64-{version}.zip",
              "dmg_url": f"{base}/LumenTV-mac-amd64-{version}.dmg",
            },
          }
          open("./release-files/version.json", "w").write(json.dumps(data, indent=2) + "\n")
          PY
        env:
          VERSION: ${{ needs.set-tag.outputs.tag }}
          REPO: ${{ github.repository }}

      - name: 📖 Extract changelog for current version
        id: changelog
        run: |
          echo "📖 从 CHANGELOG.md 提取 ${{ needs.set-tag.outputs.tag }} 的更新日志"
          
          # 去除版本号前缀的 'v' (CHANGELOG 中使用 v1.1.6 格式)
          VERSION_WITH_V="${{ needs.set-tag.outputs.tag }}"
          
          # 使用 awk 提取对应版本的更新日志
          CHANGELOG=$(awk -v version="$VERSION_WITH_V" '
            BEGIN { found=0; content="" }
            /^## / {
              if (found) exit
              if ($2 == version) {
                found=1
                next
              }
            }
            found && /^## / { exit }
            found { 
              if (content != "") content = content "\n"
              content = content $0
            }
            END { print content }
          ' CHANGELOG.md)
          
          # 如果未找到对应的版本日志，使用默认文本
          if [ -z "$CHANGELOG" ]; then
            echo "⚠️ 未找到 $VERSION_WITH_V 的更新日志，使用默认文本"
            CHANGELOG=$(printf -- "- 发布新版本 %s\n- 详细更新内容请查看 CHANGELOG.md" "$VERSION_WITH_V")
          fi
          
          echo "✅ 提取到的更新日志:"
          echo "$CHANGELOG"
          
          # 将多行内容保存到环境变量（使用 GitHub Actions 的多行语法）
          # 注意：需要对内容进行转义，避免 YAML 解析错误
          echo "changelog<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-files/*
          tag_name: ${{ needs.set-tag.outputs.tag }}
          name: "LumenTV ${{ needs.set-tag.outputs.tag }}"
          body: |
            ## LumenTV ${{ needs.set-tag.outputs.tag }} 发布
            
            ### 📝 更新日志
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            ### 📦 包含文件
            - **Windows**: MSI 安装包和 ZIP 压缩包（内置 Python）
            - **Linux**: DEB 包和 ZIP 压缩包（内置 Python）
            - **macOS arm64**: DMG / ZIP（Apple Silicon，内置 Python）
            - **macOS amd64**: DMG / ZIP（Intel，内置 Python）
            - **Updater**: 各平台独立的更新器组件
            - **version.json**: 版本信息文件
            
            ### 🔗 快速下载
            
            | 平台 | 安装包 | 压缩包 |
            |------|--------|--------|
            | Windows | [MSI](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-win-${{ needs.set-tag.outputs.tag }}.msi) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-win-${{ needs.set-tag.outputs.tag }}.zip) |
            | Linux | [DEB](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-linux-${{ needs.set-tag.outputs.tag }}.deb) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-linux-${{ needs.set-tag.outputs.tag }}.zip) |
            | macOS arm64 | [DMG](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-arm64-${{ needs.set-tag.outputs.tag }}.dmg) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-arm64-${{ needs.set-tag.outputs.tag }}.zip) |
            | macOS amd64 | [DMG](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-amd64-${{ needs.set-tag.outputs.tag }}.dmg) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ needs.set-tag.outputs.tag }}/LumenTV-mac-amd64-${{ needs.set-tag.outputs.tag }}.zip) |
            
            > 💡 提示：完整的历史更新记录请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
    permissions:
      contents: write
