name: set-tag
on:
  workflow_call:
    outputs:
      tag:
        description: "latest tag with optional suffix"
        value: ${{ jobs.set-tag.outputs.tag }}
      lastTag:
        description: "previous tag before latest"
        value: ${{ jobs.set-tag.outputs.lastTag }}

jobs:
  set-tag:
    name: set-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-version.outputs.tag }}
      lastTag: ${{ steps.get-last-tag.outputs.lastTag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 获取最新标签
      - id: get-latest-tag
        run: |
          LATEST_TAG=$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          
          # 如果没有找到匹配的标签，使用默认值
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.1"
          fi
          
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 获取上一个标签
      - id: get-last-tag
        run: |
          LAST_TAG=$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "lastTag=$LAST_TAG" >> $GITHUB_OUTPUT

      # 统一版本号生成逻辑
      - id: set-version
        run: |
          BASE="${{ steps.get-latest-tag.outputs.LATEST_TAG }}"
          REF="${{ github.ref }}"
          REF_NAME="${{ github.ref_name }}"

          if [ "$REF" = "refs/heads/pre-release" ]; then
            NEW_TAG="${BASE}-alpha.$(date +'%Y%m%d%H%M')"
          elif [[ "$REF" == refs/tags/v* ]]; then
            NEW_TAG="$REF_NAME"
          elif [ "$REF" = "refs/heads/main" ] || [ "$REF" = "refs/heads/master" ]; then
            # 正式分支复用最新语义化 tag（覆盖/更新对应 Release）
            NEW_TAG="$BASE"
          else
            # 实验分支等：独立预发布 tag，避免盖掉正式版下载区
            SAFE_BRANCH=$(echo "$REF_NAME" | tr '/' '-' | tr -cd '[:alnum:]._-')
            NEW_TAG="${BASE}-exp.${SAFE_BRANCH}.$(date +'%Y%m%d%H%M')"
          fi

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated release tag: $NEW_TAG"
